---
# Global variables available to all hosts
# Adjust these to match your deployment environment.

# Scenario name (used in banners and artefact paths)
scenario_name: "NG-SOC LM8 – Incident Response and Forensics (Sub Case 1a)"

# Internal DNS suffix used in synthetic IoC hostnames
internal_domain: "ngsoc-lm8.internal"

# Analyst training user (created on security-tools hosts for student access)
student_user: "analyst"
# TODO: replace with a real SHA-512 hash before deploying.
# Generate with: python3 -c "import crypt; print(crypt.crypt('PASSWORD', crypt.mksalt(crypt.METHOD_SHA512)))"
student_password_hash: "CHANGEME"

# Common package list installed on every node
common_packages:
  - curl
  - wget
  - git
  - vim
  - net-tools
  - tcpdump
  - nmap
  - unzip
  - python3
  - python3-pip
  - jq
  - htop
  - tree
  - ca-certificates
  - gnupg
  - lsb-release

# NTP server (use platform's internal NTP if available)
ntp_server: "pool.ntp.org"

# Wazuh version
wazuh_version: "4.7"

# MISP version (Docker tag)
misp_docker_tag: "latest"

# Synthetic C2 details (all fictional, contained within the sandbox)
c2_ip: "10.10.20.20"
c2_port: 4444
c2_domain: "update-svc.blackfalcon-sim.internal"

# Banking web application virtual host
banking_app_ip: "10.10.20.10"
banking_app_fqdn: "web-banking.ngsoc-lm8.internal"

# Velociraptor server on analyst-host
velociraptor_server_ip: "10.10.40.20"
velociraptor_port: 8000
