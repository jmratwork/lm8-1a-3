---
# Role: c2-server
# Simulates the Black Falcon C2 / banking-malware infrastructure (Exercise 1 & 3).
# This is a LISTENER ONLY – no offensive capability, no real malware.
# Logs all incoming connections; Wazuh agent (on siem) monitors the log.
# MITRE ATT&CK: T1071.001 (C2 via Web Protocol)

- name: Install dependencies
  ansible.builtin.apt:
    name:
      - netcat-openbsd
      - python3
      - python3-pip
    state: present

- name: Create C2 simulation directory
  ansible.builtin.file:
    path: /opt/c2-sim
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy C2 listener script
  ansible.builtin.copy:
    dest: /opt/c2-sim/listener.py
    mode: "0755"
    content: |
      #!/usr/bin/env python3
      """
      NG-SOC LM8 – C2 Simulation Listener
      Accepts connections on port 4444, logs client IP and timestamp.
      This is a training artefact – not real malware infrastructure.
      """
      import socket
      import datetime
      import logging

      logging.basicConfig(
          filename='/var/log/c2-sim/connections.log',
          level=logging.INFO,
          format='%(asctime)s %(message)s',
          datefmt='%Y-%m-%dT%H:%M:%SZ'
      )

      HOST = '0.0.0.0'
      PORT = 4444

      def main():
          with socket.socket(socket.AF_INET, socket.SOCK_STREAM) as srv:
              srv.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
              srv.bind((HOST, PORT))
              srv.listen(10)
              logging.info(f"[c2-sim] Listener started on {HOST}:{PORT}")
              while True:
                  try:
                      conn, addr = srv.accept()
                      logging.info(
                          f"[c2-sim] BEACON received from {addr[0]}:{addr[1]} – "
                          f"BlackFalcon/banking-trojan beacon"
                      )
                      conn.sendall(b"ACK\n")
                      conn.close()
                  except Exception as e:
                      logging.error(f"[c2-sim] Error: {e}")

      if __name__ == '__main__':
          main()

- name: Create C2 log directory
  ansible.builtin.file:
    path: /var/log/c2-sim
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy systemd service for C2 listener
  ansible.builtin.copy:
    dest: /etc/systemd/system/c2-sim.service
    content: |
      [Unit]
      Description=NG-SOC C2 Simulation Listener (training artefact)
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/bin/python3 /opt/c2-sim/listener.py
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    mode: "0644"

- name: Enable and start C2 listener service
  ansible.builtin.systemd:
    name: c2-sim
    state: started
    enabled: true
    daemon_reload: true

- name: Deploy simple HTTP page (simulates C2 web panel – for scanning discovery)
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Deploy C2 web panel stub (nginx)
  ansible.builtin.copy:
    dest: /var/www/html/index.html
    content: |
      <html><head><title>BlackFalcon C2 Panel</title></head>
      <body>
        <h2>BlackFalcon Banking Trojan C2 – Control Panel</h2>
        <p>Version: 2.1.4-sim | Build: 20250101-NGSOC-TRAINING</p>
        <p style="color:red"><b>TRAINING ENVIRONMENT – SYNTHETIC DATA ONLY</b></p>
        <p>Registered bots: 1 | Active sessions: 1</p>
        <p>Campaign: BF-Q4-2025 | Target: EMEA Financial Sector</p>
      </body></html>
    mode: "0644"

- name: Ensure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
