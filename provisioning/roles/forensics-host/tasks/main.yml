- name: Deploy forensic analysis quick-reference card
  ansible.builtin.copy:
    dest: /home/{{ student_user }}/tools/forensics-quickref.txt
    content: |
      DFIR QUICK REFERENCE – NG-SOC LM8
      ====================================

      # Hash verification (chain of custody)
      sha256sum /path/to/file
      hashdeep -r /dir/to/hash > manifest.txt
      hashdeep -r -a -k manifest.txt /dir/to/verify

      # Disk imaging (write-blocked)
      dcfldd if=/dev/sda of=/evidence/disk-image.dd hash=sha256 hashlog=/evidence/disk-image.sha256

      # Memory acquisition (if LiME module available)
      insmod lime-$(uname -r).ko "path=/evidence/memory.lime format=lime"

      # Process listing (Velociraptor hunt)
      velociraptor query "SELECT * FROM pslist()" --config /etc/velociraptor/server.config.yaml

      # Network connections
      ss -tulpn
      netstat -an

      # Volatile data capture (order of volatility)
      1. Running processes: ps aux
      2. Network connections: ss -an
      3. Open files: lsof
      4. System logs: journalctl --no-pager
      5. Disk image: dcfldd / dd

      # The Sleuth Kit
      mmls disk.dd              # Partition table
      fls -r -o <offset> disk.dd  # File system listing
      icat -o <offset> disk.dd <inode>  # Extract file by inode

      # Volatility 3
      python3 -m volatility3 -f memory.lime linux.pslist
      python3 -m volatility3 -f memory.lime linux.netstat
      python3 -m volatility3 -f memory.lime linux.bash
    mode: "0644"
    owner: "{{ student_user }}"
    group: "{{ student_user }}"
